<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pipeline Dashboard - Orchestrator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-[#f8fafc] text-slate-800 font-sans antialiased overflow-hidden">

  <!-- Main Container -->
  <div class="flex h-screen w-screen overflow-hidden">
    
    <!-- Left Sidebar -->
    <aside class="w-64 bg-white border-r border-slate-200 flex flex-col justify-between flex-shrink-0">
      <div>
        <!-- Logo Branding -->
        <div class="p-6 flex items-center space-x-3">
          <div class="flex-shrink-0">
            <!-- Stack Logo SVG -->
            <svg class="w-7 h-7 text-black" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
              <path d="M2 17l10 5 10-5"></path>
              <path d="M2 12l10 5 10-5"></path>
            </svg>
          </div>
          <div>
            <h1 class="text-[15px] font-bold text-slate-900 leading-tight">Orchestrator</h1>
            <p class="text-[9px] text-slate-400 font-semibold tracking-wider uppercase">BUILD V2.4.0</p>
          </div>
        </div>

        <!-- Navigation Links -->
        <nav class="mt-4 px-3 space-y-1">
          <a href="index.html" class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm font-semibold text-slate-900 bg-slate-100 transition-colors">
            <svg class="w-4 h-4 text-slate-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7"></rect>
              <rect x="14" y="3" width="7" height="7"></rect>
              <rect x="14" y="14" width="7" height="7"></rect>
              <rect x="3" y="14" width="7" height="7"></rect>
            </svg>
            <span>Pipelines</span>
          </a>
          <a href="#" class="flex items-center space-x-3 px-4 py-2.5 rounded-lg text-sm font-medium text-slate-500 hover:bg-slate-50 hover:text-slate-900 transition-colors">
            <svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
            <span>Settings</span>
          </a>
        </nav>
      </div>

      <!-- User Profile footer -->
      <div class="p-4 border-t border-slate-100 flex items-center space-x-3">
        <div class="flex-shrink-0">
          <img src="images/alex_chen_avatar.png" alt="Alex Chen" class="w-9 h-9 rounded-full object-cover border border-slate-200">
        </div>
        <div class="min-w-0 flex-1">
          <h3 class="text-xs font-bold text-slate-800 truncate leading-none">Alex Chen</h3>
          <p class="text-[10px] text-slate-400 font-medium truncate mt-0.5">Platform Eng</p>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col overflow-hidden">
      
      <!-- Top Navbar -->
      <header class="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between flex-shrink-0">
        <div class="flex items-center space-x-4">
          <h2 class="text-[16px] font-bold text-slate-900">Pipeline Dashboard</h2>
          <div class="h-5 w-px bg-slate-200"></div>
          <div class="flex items-center text-slate-500 text-xs font-medium">
            <svg class="w-4 h-4 text-slate-400 mr-1.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <span class="font-mono text-slate-500 bg-slate-50 px-2 py-0.5 rounded border border-slate-100">root/prod-cluster</span>
          </div>
        </div>

        <!-- Right Side Actions -->
        <div class="flex items-center space-x-3">
          <!-- Search Input -->
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
              <svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
            </span>
            <input type="text" id="searchInput" placeholder="Search pipelines..." class="w-60 pl-9 pr-4 py-1.5 bg-slate-50 hover:bg-slate-100/50 focus:bg-white border border-slate-200 rounded-lg text-xs placeholder-slate-400 text-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-200 focus:border-slate-400 transition-all">
          </div>

          <!-- Refresh Button -->
          <button id="refreshBtn" class="p-2 text-slate-500 hover:text-slate-800 hover:bg-slate-50 border border-slate-200 rounded-lg transition-colors bg-white shadow-sm flex items-center justify-center">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 4v6h-6"></path>
              <path d="M1 20v-6h6"></path>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
          </button>

          <!-- Notification Bell -->
          <button class="relative p-2 text-slate-500 hover:text-slate-800 hover:bg-slate-50 border border-slate-200 rounded-lg transition-colors bg-white shadow-sm flex items-center justify-center">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span class="absolute -top-1 -right-1 flex h-4 w-4 items-center justify-center rounded-full bg-[#e11d48] text-[9px] font-bold text-white ring-2 ring-white">4</span>
          </button>
        </div>
      </header>

      <!-- Scrollable Dashboard Content -->
      <main class="flex-1 overflow-y-auto px-8 py-6 space-y-6">
        
        <!-- Stats Cards Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <!-- Total Pipelines -->
          <div class="bg-white border border-slate-200 rounded-xl p-5 flex justify-between items-center shadow-sm">
            <div>
              <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total Pipelines</span>
              <div class="text-3xl font-extrabold text-slate-900 mt-1" id="statTotal">--</div>
            </div>
            <div class="w-11 h-11 bg-slate-50 border border-slate-100 rounded-lg flex items-center justify-center text-slate-800 shadow-sm flex-shrink-0">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                <path d="M2 17l10 5 10-5"></path>
                <path d="M2 12l10 5 10-5"></path>
              </svg>
            </div>
          </div>

          <!-- Health Score -->
          <div class="bg-white border border-slate-200 rounded-xl p-5 flex justify-between items-center shadow-sm">
            <div>
              <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Health Score</span>
              <div class="text-3xl font-extrabold text-emerald-600 mt-1" id="statHealth">--</div>
            </div>
            <div class="w-11 h-11 bg-emerald-50 border border-emerald-100 rounded-lg flex items-center justify-center text-emerald-500 shadow-sm flex-shrink-0">
              <svg class="w-5 h-5 fill-emerald-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
              </svg>
            </div>
          </div>

          <!-- Active Runs -->
          <div class="bg-white border border-slate-200 rounded-xl p-5 flex justify-between items-center shadow-sm">
            <div>
              <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Active Runs</span>
              <div class="text-3xl font-extrabold text-amber-600 mt-1" id="statActive">--</div>
            </div>
            <div class="w-11 h-11 bg-amber-50 border border-amber-100 rounded-lg flex items-center justify-center text-amber-500 shadow-sm flex-shrink-0">
              <svg class="w-5 h-5 animate-spin-slow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- Recent Pipeline Runs Section -->
        <div class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex flex-col">
          
          <!-- Actions Header -->
          <div class="px-6 py-4 border-b border-slate-150 flex items-center justify-between">
            <h3 class="text-[14px] font-bold text-slate-900">Recent Pipeline Runs</h3>
            <div class="flex items-center space-x-2.5">
              <!-- Filter Button -->
              <button id="filterBtn" class="flex items-center space-x-1.5 px-3 py-1.5 border border-slate-200 rounded-lg text-xs text-slate-600 hover:bg-slate-50 font-semibold shadow-sm transition-colors">
                <svg class="w-3.5 h-3.5 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="4" y1="21" x2="4" y2="14"></line>
                  <line x1="4" y1="10" x2="4" y2="3"></line>
                  <line x1="12" y1="21" x2="12" y2="12"></line>
                  <line x1="12" y1="8" x2="12" y2="3"></line>
                  <line x1="20" y1="21" x2="20" y2="16"></line>
                  <line x1="20" y1="12" x2="20" y2="3"></line>
                  <line x1="1" y1="14" x2="7" y2="14"></line>
                  <line x1="9" y1="8" x2="15" y2="8"></line>
                  <line x1="17" y1="16" x2="23" y2="16"></line>
                </svg>
                <span>Filter</span>
              </button>
              <!-- New Pipeline Button -->
              <button class="flex items-center space-x-1.5 px-3.5 py-1.5 bg-black text-white rounded-lg text-xs font-semibold hover:bg-slate-800 shadow-sm transition-colors">
                <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>New Pipeline</span>
              </button>
            </div>
          </div>

          <!-- Table Wrapper -->
          <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b border-slate-100 bg-[#fafafa]">
                  <th class="py-3 px-6 text-[10px] font-bold uppercase text-slate-400 tracking-wider">Name</th>
                  <th class="py-3 px-6 text-[10px] font-bold uppercase text-slate-400 tracking-wider">Branch</th>
                  <th class="py-3 px-6 text-[10px] font-bold uppercase text-slate-400 tracking-wider">Status</th>
                  <th class="py-3 px-6 text-[10px] font-bold uppercase text-slate-400 tracking-wider">Duration</th>
                  <th class="py-3 px-6 text-[10px] font-bold uppercase text-slate-400 tracking-wider">Started At</th>
                  <th class="py-3 px-6 w-12"></th>
                </tr>
              </thead>
              <tbody id="pipelinesList" class="divide-y divide-slate-100 font-medium">
                <!-- Dynamically populated rows -->
              </tbody>
            </table>
          </div>

          <!-- Loading View -->
          <div id="loading" class="flex flex-col items-center justify-center py-16 text-slate-400 border-t border-slate-100">
            <div class="animate-spin h-6 w-6 border-2 border-slate-500 rounded-full border-t-transparent"></div>
            <span class="text-xs mt-3 font-semibold">Loading pipelines...</span>
          </div>

          <!-- Empty View -->
          <div id="emptyState" class="hidden text-center py-16 text-slate-400 border-t border-slate-100">
            <p class="text-sm font-semibold">No pipelines found.</p>
          </div>

          <!-- Table Footer / Pagination -->
          <div class="px-6 py-4.5 border-t border-slate-150 flex items-center justify-between bg-[#fafafa]/50">
            <span class="text-xs text-slate-400 font-semibold" id="paginationInfo">Showing 10 of 42 pipelines</span>
            <div class="flex items-center space-x-1" id="paginationControls">
              <!-- Dynamically populated pagination buttons -->
            </div>
          </div>

        </div>

      </main>

    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
