<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pipeline Details</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg-gray-100 font-sans">
  <div class="container mx-auto p-4">
    <a href="index.html" class="text-blue-600 hover:underline mb-4 inline-block">&larr; Back to Pipelines</a>
    <h1 class="text-2xl font-bold mb-2 text-gray-800" id="pipelineName">Pipeline: Loading...</h1>
    <p class="text-sm text-gray-600 mb-6">Branch: <span id="pipelineBranch"></span> | Last updated: <span
        id="lastUpdated">Loading...</span></p>

    <div id="loading" class="flex justify-center">
      <div class="animate-spin h-8 w-8 border-4 border-blue-500 rounded-full border-t-transparent"></div>
    </div>

    <div id="jobsContainer" class="hidden grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
      <!-- Jobs will be inserted here -->
    </div>

    <div id="emptyJobs" class="hidden text-center py-10">
      <p class="text-gray-500">No jobs found for this pipeline.</p>
    </div>
  </div>

  <script type="module" src="js/pipeline.js"></script>
</body>

</html>
